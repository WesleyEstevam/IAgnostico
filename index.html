  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

:center; max-width:640px; margin:0 auto 48px;\">\n        <div style=\"font-weight:800; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:#0e9d5e;\">Se você tá no começo da medicina<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka'; font-weight:700; font-size:clamp(28px,4vw,42px); line-height:1.1; color:#0e2a22; margin:14px 0 0;\">Provavelmente já passou por isso<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px;\">\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">🧩<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Você decora as doenças, mas na hora do caso clínico não sabe por onde <strong style=\"color:#0e2a22;\">começar a investigar<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">✅<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Marca a alternativa certa no banco de questões e mesmo assim <strong style=\"color:#0e2a22;\">não saberia conduzir<\u002Fstrong> aquele paciente na vida real.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">🔌<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Sente que sabe muito <strong style=\"color:#0e2a22;\">conteúdo solto<\u002Fstrong> e nada conectado.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">🥶<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Tem pavor de chegar no internato e <strong style=\"color:#0e2a22;\">congelar na frente do preceptor<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">⏳<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Estuda horas, mas continua <strong style=\"color:#0e2a22;\">inseguro<\u002Fstrong> quando precisa raciocinar do zero.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:24px;\"><div style=\"font-size:26px; margin-bottom:12px;\">⚠️<\u002Fdiv><p style=\"margin:0; font-weight:700; font-size:16px; line-height:1.5; color:#33514a;\">Sabe que <strong style=\"color: rgb(14, 42, 34);\">questão de prova ≠ paciente de verdade<\u002Fstrong>&nbsp;e isso te assusta.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= SOLUÇÃO / COMO FUNCIONA ================= -->\n  <section id=\"como\" style=\"background:#fff; padding:clamp(56px,8vw,100px) clamp(20px,5vw,48px);\">\n    <div style=\"max-width:1100px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"text-align:center; max-width:720px; margin:0 auto 18px;\">\n        <div style=\"font-weight:800; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:#0e9d5e;\">A solução<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka'; font-weight:700; font-size:clamp(28px,4vw,44px); line-height:1.08; color:#0e2a22; margin:14px 0 0;\">O problema não é quanto você estuda.<br>É <span style=\"color:#0e9d5e;\">como você treina.<\u002Fspan><\u002Fh2>\n        <p style=\"font-weight:600; font-size:clamp(16px,2vw,18px); line-height:1.55; color:#46615a; margin:18px auto 0; max-width:600px;\">Banco de questões te treina pra reconhecer a resposta. Caso clínico de verdade exige que você <strong style=\"color: rgb(14, 42, 34);\">construa a resposta<\u002Fstrong>&nbsp;do zero, com o relógio correndo.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:clamp(32px,5vw,56px); margin-top:48px;\">\n        <!-- steps -->\n        <div style=\"flex:1 1 420px; min-width:300px; display:flex; flex-direction:column; gap:14px;\">\n          <div data-reveal=\"\" style=\"display:flex; gap:16px; align-items:flex-start; background:#f6fbf9; border:1px solid #e6f1ec; border-radius:18px; padding:18px 20px;\"><div style=\"flex:none; width:36px; height:36px; border-radius:11px; background:#e3f7ee; color:#0e9d5e; font-family:'Fredoka'; font-weight:600; font-size:18px; display:flex; align-items:center; justify-content:center;\">1<\u002Fdiv><div><div style=\"font-weight:900; font-size:16px; color:#0e2a22;\">Escolhe a especialidade<\u002Fdiv><div style=\"font-weight:600; font-size:14px; color:#56716a; margin-top:2px;\">Cardio, pneumo, neuro… você decide o terreno.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div data-reveal=\"\" style=\"display:flex; gap:16px; align-items:flex-start; background:#f6fbf9; border:1px solid #e6f1ec; border-radius:18px; padding:18px 20px;\"><div style=\"flex:none; width:36px; height:36px; border-radius:11px; background:#e3f7ee; color:#0e9d5e; font-family:'Fredoka'; font-weight:600; font-size:18px; display:flex; align-items:center; justify-content:center;\">2<\u002Fdiv><div><div style=\"font-weight:900; font-size:16px; color:#0e2a22;\">Investiga via chat<\u002Fdiv><div style=\"font-weight:600; font-size:14px; color:#56716a; margin-top:2px;\">Conversa com o paciente como num atendimento real.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div data-reveal=\"\" style=\"display:flex; gap:16px; align-items:flex-start; background:#f6fbf9; border:1px solid #e6f1ec; border-radius:18px; padding:18px 20px;\"><div style=\"flex:none; width:36px; height:36px; border-radius:11 tive; width:min(480px,100%);\">\n            <div style=\"border-radius:18px; overflow:hidden; box-shadow:0 30px 60px -22px rgba(20,60,48,.3); border:1px solid #eef2f0;\">\n              <img src=\"a0ad936a-1f9c-4c62-ba04-dca9700f913d\" style=\"width:100%; display:block;\" alt=\"Caso clínico no IAgnóstico\">\n            <\u002Fdiv>\n            <div style=\"position:absolute; right:-16px; top:-16px; z-index:3; animation:floatC 5s ease-in-out infinite; padding:10px 14px; border-radius:14px; background:#fff; box-shadow:0 14px 28px -10px rgba(20,60,48,.28); border:1px solid #f0f3f1; font-weight:900; font-size:13px; color:#e8a020;\">★ +200 XP<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div data-reveal=\"\" style=\"text-align:center; margin-top:40px; font-family:'Fredoka'; font-weight:500; font-size:clamp(18px,2.4vw,22px); color:#0e9d5e;\">É treino de raciocínio clínico que vicia. Esse é o ponto.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= BENEFÍCIOS ================= -->\n  <section id=\"beneficios\" style=\"background:#f3fbf7; padding:clamp(56px,8vw,100px) clamp(20px,5vw,48px);\">\n    <div style=\"max-width:1100px; margin:0 auto;\">\n      <div data-reveal=\"\" style=\"text-align:center; max-width:640px; margin:0 auto 48px;\">\n        <div style=\"font-weight:800; font-size:13px; letter-spacing:.1em; text-transform:uppercase; color:#0e9d5e;\">A transformação<\u002Fdiv>\n        <h2 style=\"font-family:'Fredoka'; font-weight:700; font-size:clamp(28px,4vw,42px); line-height:1.1; color:#0e2a22; margin:14px 0 0;\">Não é mais uma feature. É como você vira médico.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:18px;\">\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">🧠<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Para de decorar, começa a raciocinar<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">Você treina o processo de pensar como médico, não a memória de marcar alternativa.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">⏱️<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Cabe na sua rotina caótica<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">Partidas de 4 a 10 minutos. Treine na fila do RU ou entre uma aula e outra.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">🩺<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Chega no internato com a cabeça treinada<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">Quando o caso real aparecer, você já investigou centenas parecidos. Sem congelar.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">🎯<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Feedback que mostra o \"porquê\"<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">A IA não só corrige, explica onde seu raciocínio furou pra você não repetir o erro.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">🏆<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Competição que te faz voltar todo dia<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">Ranking, XP e desafio com os amigos transformam estudo em algo que você quer fazer.<\u002Fp><\u002Fdiv>\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e8f0ec; border-radius:20px; padding:26px;\"><div style=\"font-size:30px; margin-bottom:14px;\">🔁<\u002Fdiv><div style=\"font-family:'Fredoka'; font-weight:600; font-size:19px; color:#0e2a22; margin-bottom:6px;\">Aprende errando sem custo<\u002Fdiv><p style=\"margin:0; font-weight:600; font-size:15px; line-height:1.5; color:#56716a;\">Aqui o paciente é virtual. Você erra, entende e melhora sem ninguém em risco.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= OBJEÇÃO: BANCO DE QUESTÕES ================= -->\n  <section style=\"background:#fff; padding:clamp(48px,7vw,84px) clamp(20px,5vw,48px);\">\n    <div data-reveal=\"\" style=\"max-width:760px; margin:0 auto; background:linear-gradient(135deg,#0e2a22,#10362b); border-radius:26px; padding:clamp(32px,5vw,48px); color:#eafaf2; position:relative; overflow:hidden;\">\n      <div style=\"position:absolute; top:-60px; right:-40px; width:240px; height:240px; border-radius:50%; background:radial-gradient(circle,rgba(30,217,138,.22),rgba(30,217,138,0) 70%);\"><\u002Fdiv>\n      <div style=\"position:relative; z-index:2;\">\n        <div style=\"font-weight:800; font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:#7ff0c0;\">\"Mas eu já tenho Medcurso, Sanar…\"<\u002Fdiv>\n        <h3 style=\"font-family:'Fredoka'; font-weight:600; font-size:clamp(22px,3vw,30px); line-height:1.2; margin:14px 0 14px; color:#fff;\">Perfeito. Continua usando.<\u002Fh3>\n        <p style=\"font-weight:600; font-siz :22px;\">Sem cartão. Sem compromisso.<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:26px;\">\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#0e9d5e;\">✓<\u002Fspan> Módulo de competição<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#0e9d5e;\">✓<\u002Fspan> Casos clínicos por especialidade<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#0e9d5e;\">✓<\u002Fspan> Feedback de raciocínio pela IA<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#0e9d5e;\">✓<\u002Fspan> XP e ranking global<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#0e9d5e;\">✓<\u002Fspan> 5 plantões (com recarga por tempo)<\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"#cta\" style=\"text-decoration:none; display:block; text-align:center; padding:16px; border-radius:16px; background:linear-gradient(180deg,#1ED98A,#13B870); color:#06311f; font-family:'Fredoka'; font-weight:600; font-size:17px; box-shadow:0 7px 0 #0E9A5B;\">Criar conta grátis<\u002Fa>\n        <\u002Fdiv>\n        <!-- pro -->\n        <div data-reveal=\"\" style=\"background:#fff; border:1px solid #e3ebe7; border-radius:24px; padding:32px;\">\n          <div style=\"font-family:'Fredoka'; font-weight:600; font-size:22px; color:#0e2a22;\">Pro<\u002Fdiv>\n          <div style=\"display:flex; align-items:baseline; gap:6px; margin:8px 0 4px;\"><span style=\"font-family:'Fredoka'; font-weight:600; font-size:46px; color:#0e2a22;\">R$ 49,90<\u002Fspan><span style=\"font-weight:800; font-size:15px; color:#6b8479;\">/mês<\u002Fspan><\u002Fdiv>\n          <div style=\"font-weight:700; font-size:13px; color:#6b8479; margin-bottom:22px;\">Só se você quiser. Quando quiser.<\u002Fdiv>\n          <div style=\"display:flex; flex-direction:column; gap:12px; margin-bottom:26px;\">\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color: rgb(45, 175, 208);\">✓<\u002Fspan> Até 20 plantões<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#2dafd0;\">✓<\u002Fspan> Sem anúncios<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#2dafd0;\">✓<\u002Fspan> Mais interações por partida<\u002Fdiv>\n            <div style=\"display:flex; gap:10px; font-weight:700; font-size:15px; color:#33514a;\"><span style=\"color:#2dafd0;\">✓<\u002Fspan> Vantagens competitivas no ranking<\u002Fdiv>\n          <\u002Fdiv>\n          <a href=\"#cta\" style=\"text-decoration:none; display:block; text-align:center; padding:16px; border-radius:16px; background:#eef4f1; color:#143028; font-family:'Fredoka'; font-weight:600; font-size:17px;\">Virar Pro depois<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= CTA FINAL ================= -->\n  <section id=\"cta\" style=\"position:relative; overflow:hidden; background:linear-gradient(160deg,#0e2a22 0%,#11402f 100%); padding:clamp(64px,9vw,120px) clamp(20px,5vw,48px); text-align:center;\">\n    <div style=\"position:absolute; top:-80px; left:-60px; width:360px; height:360px; border-radius:50%; background:radial-gradient(circle,rgba(30,217,138,.2),rgba(30,217,138,0) 70%); animation:blobDrift 16s ease-in-out infinite;\"><\u002Fdiv>\n    <div style=\"position:absolute; bottom:-100px; right:-40px; width:320px; height:320px; border-radius:50%; background:radial-gradient(circle,rgba(45,189,230,.16),rgba(45,189,230,0) 70%); animation:blobDrift 20s ease-in-out infinite;\"><\u002Fdiv>\n    <div data-reveal=\"\" style=\"position:relative; z-index:2; max-width:720px; margin:0 auto;\">\n      <h2 style=\"font-family:'Fredoka'; font-weight:700; font-size:clamp(30px,4.6vw,52px); line-height:1.05; color:#fff; margin:0;\">Começa a treinar o raciocínio <span style=\"color:#5ef0b3;\">agora.<\u002Fspan><\u002Fh2>\n      <p style=\"font-weight:600; font-size:clamp(16px,2.2vw,20px); line-height:1.55; color:#bfe6d6; margin:22px auto 0; max-width:560px;\">De graça, em partidas de poucos minutos, no ritmo de quem um dia vai ter um paciente de verdade na frente. A primeira partida tá esperando.<\u002Fp>\n      <div style=\"margin-top:36px;\">\n        <a href=\"#\" style=\"text-decoration:none; display:inline-block; padding:20px 38px; border-radius:20px; background:linear-gradient(180deg,#1ED98A,#13B870); color:#06311f; font-family:'Fredoka'; font-weight:600; font-size:clamp(18px,2.4vw,22px); box-shadow:0 11px 0 #0E9A5B, 0 22px 44px -12px rgba(30,217,138,.55); animation:glowPulse 3.2s ease-in-out infinite;\">Criar conta grátis e jogar agora<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"font-weight:700; font-size:13px; color:#8fc7b3; margin-top:18px;\">Grátis • Sem cartão • Começa em 30 segundos<\u002Fdiv>\n      <div style=\"margin-top:40px; padding-top:28px; border-top:1px solid rgba(255,255,255,.1); font-weight:600; font-size:15px; line-height:1.6; color:#9fd3c0; max-width:560px; margin-left:auto; margin-right:auto;\"><strong style=\"color:#eafaf2;\">P.S.<\u002Fstrong> — A diferença entre o estudante que congela no internato e o que conduz o caso com confiança não é quanto conteúdo ele decorou. É quantas vezes ele treinou o raciocínio antes de precisar dele.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"background:#0a201a; padding:36px clamp(20px,5vw,48px); display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:16px;\">\n    <div style=\"display:flex; align-items:center; gap:10px;\">\n      <div style=\"width:30px; height:30px; border-radius:9px; background:linear-gradient(135deg,#1ED98A,#13B26E); display:flex; align-items:center; justify-content:center; font-size:16px;\">🩺<\u002Fdiv>\n      <span style=\"font-family:'Fredoka'; font-weight:600; font-size:18px; color:#eafaf2;\">IAgnóstico<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"font-weight:600; font-size:13px; color:#6f9183;\">© 2026 IAgnóstico · Simulador de raciocínio clínico<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    // parallax\n    this._onMove = (e) => {\n      const cx = window.innerWidth / 2, cy = window.innerHeight / 2;\n      const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;\n      document.querySelectorAll('[data-px]').forEach((el) => {\n        const depth = parseFloat(el.getAttribute('data-px')) || 0;\n        el.style.transition = 'transform .3s cubic-bezier(.2,.8,.2,1)';\n        el.style.transform = `translate(${(-dx*depth*60).toFixed(1)}px, ${(-dy*depth*60).toFixed(1)}px)`;\n      });\n    };\n    window.addEventListener('mousemove', this._onMove);\n\n    // scroll reveal\n    const els = document.querySelectorAll('[data-reveal]');\n    els.forEach((el) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.8,.2,1), transform .7s cubic-bezier(.2,.8,.2,1)';\n    });\n    if ('IntersectionObserver' in window) {\n      this._io = new IntersectionObserver((entries) => {\n        entries.forEach((en) => {\n          if (en.isIntersecting) {\n            en.target.style.opacity = '1';\n            en.target.style.transform = 'translateY(0)';\n            this._io.unobserve(en.target);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      els.forEach((el) => this._io.observe(el));\n    } else {\n      els.forEach((el) => { el.style.opacity='1'; el.style.transform='none'; });\n    }\n\n    // show nav links on wide screens\n    this._resize = () => {\n      const wide = window.innerWidth >= 760;\n      document.querySelectorAll('[data-nav]').forEach((el) => { el.style.display = wide ? 'inline' : 'none'; });\n    };\n    this._resize();\n    window.addEventListener('resize', this._resize);\n  }\n  componentWillUnmount() {\n    if (this._onMove) window.removeEventListener('mousemove', this._onMove);\n    if (this._resize) window.removeEventListener('resize', this._resize);\n    if (this._io) this._io.disconnect();\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
